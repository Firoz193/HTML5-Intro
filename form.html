<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamal er Ma er Pitha ghor</title>
    <style>
        label {
            display: block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <header>

    </header>
    <main>
         <section>
            <h2>Please fill up the form.</h2>
            <form>
                <label for="name">Your Name:
                    <input id="name" type="text" name="name" placeholder="Enter your name">
                </label>
                <label for="email">Your Email:
                    <input id="email" type="email" name="email" placeholder="Enter your email">
                </label>
                <label for="phone">Your Phone:
                    <input id="phone" type="tel" name="phone" placeholder="Enter your phone number">
                </label>

                <fieldset>
                    <legend>Pick One Pitha</legend>
                    <label for="bhapa">Bhapa Pitha
                        <input id="bhapa" type="radio" name="pitha" value="bhapa">
                        </label>

                        <label for="Chitoy">
                            Chitoy Pitha
                            <input id="Chitoy" type="radio" name="pitha" value="Chitoy">
                        </label>
                </fieldset>

                <fieldset>
                    <legend>Pick One or More Vorta</legend>
                    <label for="alur">
                        <input id="alur" type="checkbox" name="vorta" value="alur">
                        Alur Vorta
                    </label>
                    <label for="shak">
                        <input id="shak" type="checkbox" name="vorta" value="shak">
                        Shak Vorta
                    </label>
                </fieldset>

                <fieldset>
                    <legend>Special Instruction</legend>
                    <textarea name="instruction" placeholder="Any special instructions for your order..."></textarea>
                </fieldset>
                <input type="reset" value="Reset">
                <input type="submit" value="Submit">
            </form>
        </section>
    </main>
    <footer>

    </footer>
</html>
